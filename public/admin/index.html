<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>CMS · Surya Krishna</title>
  </head>
  <body>
    <div id="debug" style="font-family:monospace;font-size:12px;padding:1rem;background:#111;color:#0f0;position:fixed;top:0;right:0;width:400px;z-index:9999;max-height:200px;overflow:auto;"></div>

    <script>
      const log = (msg) => {
        console.log(msg);
        const el = document.getElementById('debug');
        if (el) el.innerHTML += msg + '<br>';
      };

      log('Page loaded, setting up CMS config...');

      // Set config BEFORE loading the CMS script
      window.CMS_MANUAL_INIT = true;

      const cmsConfig = {
        backend: {
          name: 'github',
          repo: 's3ak6i-dev/s3ak6i-dev.github.io',
          branch: 'main',
          auth_type: 'pkce',
          app_id: 'Ov23li2RkHijA8W2tqh2',
        },
        media_folder: 'public/images',
        public_folder: '/images',
        collections: [
          {
            name: 'blog',
            label: 'Blog Posts',
            folder: 'src/content/blog',
            create: true,
            delete: true,
            slug: '{{slug}}',
            extension: 'md',
            format: 'frontmatter',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Description', name: 'description', widget: 'string' },
              {
                label: 'Publish Date',
                name: 'pubDate',
                widget: 'datetime',
                date_format: 'YYYY-MM-DD',
                time_format: false,
                picker_utc: true,
              },
              {
                label: 'Updated Date',
                name: 'updatedDate',
                widget: 'datetime',
                date_format: 'YYYY-MM-DD',
                time_format: false,
                picker_utc: true,
                required: false,
              },
              { label: 'Body', name: 'body', widget: 'markdown' },
            ],
          },
        ],
      };

      log('Config ready. Loading CMS script...');
    </script>

    <script
      src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"
      onload="onCMSLoaded()"
      onerror="log('ERROR: CMS script failed to load')"
    ></script>

    <script>
      function onCMSLoaded() {
        log('CMS script loaded. CMS object: ' + (typeof CMS));
        try {
          CMS.init({ config: cmsConfig });
          log('CMS.init() called successfully with auth_type: pkce');
        } catch (e) {
          log('ERROR in CMS.init(): ' + e.message);
        }
      }

      window.addEventListener('error', (e) => {
        log('JS ERROR: ' + e.message);
      });
    </script>
  </body>
</html>
