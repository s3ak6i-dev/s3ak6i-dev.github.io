<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>CMS Debug</title>
    <style>
      #log {
        position: fixed; bottom: 0; left: 0; right: 0;
        background: #0a0a0a; color: #00ff00;
        font: 12px/1.6 monospace; padding: 8px;
        height: 220px; overflow-y: auto;
        border-top: 2px solid #e8602c; z-index: 99999;
      }
      #log .err { color: #ff4444; }
      #log .warn { color: #ffaa00; }
      #log .ok { color: #44ff44; }
    </style>
  </head>
  <body>
    <div id="log"></div>
    <script>
      const logEl = document.getElementById('log');
      function log(msg, type) {
        const line = document.createElement('div');
        line.className = type || '';
        line.textContent = new Date().toISOString().slice(11,19) + ' ' + msg;
        logEl.appendChild(line);
        logEl.scrollTop = logEl.scrollHeight;
        console.log(msg);
      }

      // Intercept window.open to catch auth popup
      const _open = window.open.bind(window);
      window.open = function(url, ...args) {
        log('window.open → ' + url, url && url.includes('netlify') ? 'err' : 'ok');
        return _open(url, ...args);
      };

      // Intercept fetch to see config loading
      const _fetch = window.fetch.bind(window);
      window.fetch = function(url, ...args) {
        log('fetch → ' + url, 'warn');
        return _fetch(url, ...args).then(r => {
          log('fetch ← ' + url + ' [' + r.status + ']', r.ok ? 'ok' : 'err');
          return r;
        });
      };

      // Intercept XHR too
      const _XHRopen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...args) {
        log('XHR → ' + method + ' ' + url, 'warn');
        return _XHRopen.call(this, method, url, ...args);
      };

      log('Interceptors ready. Setting CMS_MANUAL_INIT...', 'ok');
      window.CMS_MANUAL_INIT = true;

      function initCMS() {
        log('CMS object type: ' + typeof CMS, 'ok');
        if (typeof CMS === 'undefined') { log('ERROR: CMS not defined!', 'err'); return; }

        log('Calling CMS.init() with auth_type: pkce...', 'ok');
        try {
          CMS.init({
            config: {
              backend: {
                name: 'github',
                repo: 's3ak6i-dev/s3ak6i-dev.github.io',
                branch: 'main',
                auth_type: 'pkce',
                app_id: 'Ov23li2RkHijA8W2tqh2',
              },
              media_folder: 'public/images',
              public_folder: '/images',
              collections: [{
                name: 'blog',
                label: 'Blog Posts',
                folder: 'src/content/blog',
                create: true,
                delete: true,
                slug: '{{slug}}',
                extension: 'md',
                format: 'frontmatter',
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Description', name: 'description', widget: 'string' },
                  { label: 'Publish Date', name: 'pubDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, picker_utc: true },
                  { label: 'Updated Date', name: 'updatedDate', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, picker_utc: true, required: false },
                  { label: 'Body', name: 'body', widget: 'markdown' },
                ],
              }],
            },
          });
          log('CMS.init() called OK', 'ok');
        } catch(e) {
          log('CMS.init() ERROR: ' + e.message, 'err');
        }
      }

      window.addEventListener('error', e => log('JS ERROR: ' + e.message, 'err'));
    </script>

    <script
      src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"
      onload="log('Decap script loaded', 'ok'); initCMS();"
      onerror="log('Decap script FAILED to load', 'err')"
    ></script>
  </body>
</html>
