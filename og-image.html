<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>OG Image</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Space Grotesk', sans-serif;
  }

  .card {
    width: 1200px;
    height: 630px;
    background: #0D0D0D;
    border: 1px solid #242424;
    border-left: 6px solid #E8602C;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 64px 80px;
    position: relative;
    overflow: hidden;
  }

  /* dot grid */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(232,96,44,0.18) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    pointer-events: none;
  }

  /* orange glow bottom-right */
  .card::after {
    content: '';
    position: absolute;
    bottom: -80px;
    right: -80px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(232,96,44,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  .top { position: relative; }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #E8602C;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .name {
    font-size: 76px;
    font-weight: 700;
    color: #E8E6E1;
    line-height: 1.0;
    letter-spacing: -0.03em;
  }

  .middle {
    position: relative;
    display: flex;
    gap: 48px;
    align-items: flex-start;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .stat-num {
    font-size: 36px;
    font-weight: 700;
    color: #E8602C;
    line-height: 1;
  }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #7A7775;
    letter-spacing: 0.06em;
  }

  .divider {
    width: 1px;
    height: 56px;
    background: #242424;
    align-self: center;
  }

  .footer {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    color: #7A7775;
    letter-spacing: 0.04em;
  }

  .tagline {
    font-size: 18px;
    color: #7A7775;
    max-width: 480px;
    line-height: 1.5;
    text-align: right;
  }

  .tagline em {
    color: #E8E6E1;
    font-style: normal;
  }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="top">
      <div class="label">AI Engineer</div>
      <div class="name">Surya Krishna</div>
    </div>

    <div class="middle">
      <div class="stat">
        <div class="stat-num">2</div>
        <div class="stat-label">IEEE Publications</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-num">1</div>
        <div class="stat-label">Filed Patent</div>
      </div>
      <div class="divider"></div>
      <div class="stat">
        <div class="stat-num">6</div>
        <div class="stat-label">Shipped Projects</div>
      </div>
    </div>

    <div class="footer">
      <div class="url">s3ak6i-dev.github.io</div>
      <div class="tagline">Building at the intersection of <em>ML and systems</em></div>
    </div>
  </div>
</body>
</html>
